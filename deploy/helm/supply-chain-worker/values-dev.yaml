replicaCount: 2

config:
  APP_ENV: dev

service:
  enabled: false

ingress:
  enabled: false

podDisruptionBudget:
  enabled: false

resourceQuota:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "3"
    limits.memory: 6Gi
    pods: "10"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi
