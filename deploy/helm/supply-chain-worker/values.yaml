nameOverride: ""
fullnameOverride: ""

replicaCount: 2

deployment:
  minReadySeconds: 10
  revisionHistoryLimit: 10
  terminationGracePeriodSeconds: 60
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
  lifecycle:
    preStop:
      enabled: true
      sleepSeconds: 20
  startupProbe:
    exec:
      command: ["python", "-c", "import src.sqs_worker"]
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 5
  readinessProbe:
    exec:
      command: ["python", "-c", "import src.sqs_worker"]
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  livenessProbe:
    exec:
      command: ["python", "-c", "import src.sqs_worker"]
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

image:
  repository: YOUR_AWS_ACCOUNT_ID.dkr.ecr.YOUR_REGION.amazonaws.com/supply-chain-reorder
  tag: latest
  pullPolicy: IfNotPresent

service:
  enabled: false
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: supply-chain-worker.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

networkPolicy:
  enabled: true
  ingress:
    enabled: false
    from: []
    ports: []
  egress:
    enabled: true
    allowDns: true
    dnsNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: kube-system
    dnsPodSelector:
      matchLabels:
        k8s-app: kube-dns
    rules:
      # Keep egress tight: HTTPS only by default. Narrow destinations with `to` selectors/ipBlocks per environment.
      - to: []
        ports:
          - protocol: TCP
            port: 443

podDisruptionBudget:
  enabled: true
  minAvailable: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: supply-chain-sqs-worker
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/supply-chain-sqs-worker-irsa

config:
  APP_ENV: production
  AWS_REGION: us-east-1
  SQS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/YOUR_AWS_ACCOUNT_ID/supply-chain-events
  SQS_WAIT_TIME_SECONDS: "20"
  SQS_VISIBILITY_TIMEOUT: "120"
  SQS_MAX_MESSAGES: "1"
  SQS_IDLE_SLEEP_SECONDS: "2"
  SQS_EMPTY_BACKOFF_BASE_SECONDS: "1"
  SQS_EMPTY_BACKOFF_MAX_SECONDS: "30"

secretRef:
  # Existing secret that includes any runtime secrets required by the app.
  name: supply-chain-agent-secrets

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

podLabels: {}
