replicaCount: 3

config:
  APP_ENV: production

service:
  enabled: false

ingress:
  enabled: false

podDisruptionBudget:
  enabled: true
  minAvailable: 2

resourceQuota:
  hard:
    requests.cpu: "3"
    requests.memory: 6Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi
