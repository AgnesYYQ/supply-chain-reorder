{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "supply-chain-worker.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "supply-chain-worker.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "supply-chain-worker.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    {{- if .Values.networkPolicy.ingress.enabled }}
    - Ingress
    {{- end }}
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  {{- if .Values.networkPolicy.ingress.enabled }}
  ingress:
    - {{- with .Values.networkPolicy.ingress.from }}
      from:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.networkPolicy.ingress.ports }}
      ports:
{{ toYaml . | indent 8 }}
      {{- end }}
  {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    {{- if .Values.networkPolicy.egress.allowDns }}
    - to:
        - namespaceSelector:
{{ toYaml .Values.networkPolicy.egress.dnsNamespaceSelector | indent 12 }}
          podSelector:
{{ toYaml .Values.networkPolicy.egress.dnsPodSelector | indent 12 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- range .Values.networkPolicy.egress.rules }}
    - {{- with .to }}
      to:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .ports }}
      ports:
{{ toYaml . | indent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
