{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "supply-chain-worker.namespace" . }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ include "supply-chain-worker.name" . }}
    {{- with .Values.namespace.labels }}
{{ toYaml . | indent 4 }}
    {{- end }}
  {{- with .Values.namespace.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
{{- end }}
